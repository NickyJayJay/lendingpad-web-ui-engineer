<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LendingPad — Users</title>
  <link rel="stylesheet" href="./styles/main.scss" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
</head>

<body>
  <main id="app">
    <!-- TEMP Phase 3 preview — remove when Phase 5 lands -->
    <section style="padding:24px;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;font-family:var(--font-family-base);">
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--search" aria-hidden="true" style="font-size:20px;"></i>search</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--filter" aria-hidden="true" style="font-size:20px;"></i>filter</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--plus" aria-hidden="true" style="font-size:20px;"></i>plus</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--pencil" aria-hidden="true" style="font-size:20px;"></i>pencil</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--three-vertical-dots" aria-hidden="true" style="font-size:20px;"></i>three-dots</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--up-sorting" aria-hidden="true" style="font-size:20px;"></i>up-sort</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--down-sorting" aria-hidden="true" style="font-size:20px;"></i>down-sort</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--page-left" aria-hidden="true" style="font-size:20px;"></i>page-left</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--page-right" aria-hidden="true" style="font-size:20px;"></i>page-right</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--page-down" aria-hidden="true" style="font-size:20px;"></i>page-down</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--invite-consumer" aria-hidden="true" style="font-size:20px;"></i>invite</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--send-email" aria-hidden="true" style="font-size:20px;"></i>send-email</div>
      <div style="display:flex;align-items:center;gap:8px;font-size:14px;"><i class="icon icon--dollar-sign" aria-hidden="true" style="font-size:20px;"></i>dollar</div>
    </section>
  </main>
  <script type="module" src="./js/main.js"></script>
</body>

</html>
